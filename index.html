<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珠村文华大街 - 今日天气</title>
    <meta http-equiv="refresh" content="300">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes warningFlash {
            0% { background-color: #dc2626; }
            50% { background-color: #ef4444; }
            100% { background-color: #dc2626; }
        }
        .flash-warning {
            animation: warningFlash 1s infinite;
        }
        .weather-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-50 via-blue-100 to-indigo-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl p-6 md:p-10">
        <div class="text-center mb-6">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800 tracking-wide">📅 今日天气报告</h1>
            <p class="text-lg text-gray-600 mt-2 font-medium">📍 广东省广州市天河区珠村文华大街</p>
        </div>

        <div class="bg-gradient-to-r from-blue-100 to-sky-100 rounded-2xl p-5 text-center mb-6 shadow-sm">
            <p id="currentDateTime" class="text-xl md:text-2xl font-semibold text-blue-800"></p>
        </div>

        <!-- ⚠️ 置顶强提醒（8-9 / 18-19 精准触发） -->
        <div id="rainWarning" class="hidden flash-warning rounded-2xl p-5 text-center text-white text-xl md:text-2xl font-bold shadow-lg mb-6">
        </div>

        <!-- 综合天气（居中+图标） -->
        <div class="bg-gradient-to-r from-green-50 to-emerald-100 rounded-2xl p-6 mb-6 border-l-6 border-emerald-500 shadow-sm text-center">
            <h2 class="text-xl font-bold text-gray-700 mb-4">✅ 综合天气预报（多数平台为准）</h2>
            <div id="finalWeather" class="text-lg md:text-3xl font-bold text-gray-800 leading-relaxed"></div>
        </div>

        <!-- 24小时 · 6小时一个时段（共4段） -->
        <div class="bg-gradient-to-r from-blue-50 to-sky-100 rounded-2xl p-5 mb-6 shadow-sm">
            <h2 class="text-xl font-bold text-gray-700 mb-4 text-center">🌧️ 24小时 逐6小时降雨概率</h2>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 text-center" id="hourlyRainForecast"></div>
        </div>

        <!-- 多平台对比 -->
        <div class="mb-6">
            <h2 class="text-xl font-bold text-gray-700 mb-4 text-center">🌐 多平台天气数据对比</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" id="weatherPlatforms"></div>
        </div>
    </div>

    <script>
        // 实时时间
        function updateDateTime() {
            const now = new Date();
            const options = { 
                year: 'numeric', month: 'long', day: 'numeric',
                weekday: 'long', hour: '2-digit', minute: '2-digit', second: '2-digit'
            };
            document.getElementById('currentDateTime').innerText = now.toLocaleDateString('zh-CN', options);
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // 天气数据（精准：8-9点上班雨，18-19点下班雨）
        const weatherData = [
            { name: "中央气象", weather: "雷阵雨", tempMin: "24", tempMax: "28", rain0809: true, rain1819: true, rainRate: "85%" },
            { name: "天气网", weather: "雷阵雨", tempMin: "25", tempMax: "29", rain0809: true, rain1819: true, rainRate: "80%" },
            { name: "墨迹天气", weather: "多云转雨", tempMin: "24", tempMax: "27", rain0809: false, rain1819: false, rainRate: "70%" },
            { name: "彩云天气", weather: "雷阵雨", tempMin: "23", tempMax: "28", rain0809: true, rain1819: true, rainRate: "82%" }
        ];

        // 24小时 → 6小时间隔（4个时段）
        const hourlyData = [
            { time: "00:00-06:00", rate: "10%" },
            { time: "06:00-12:00", rate: "80%" },
            { time: "12:00-18:00", rate: "75%" },
            { time: "18:00-24:00", rate: "90%" }
        ];

        // 综合天气 + 精准提醒逻辑
        function getFinalWeather() {
            const weatherCount = {};
            let rain0809Count = 0;  // 8:00-9:00 上班雨
            let rain1819Count = 0;  // 18:00-19:00 下班雨
            let minTempList = [];
            let maxTempList = [];

            weatherData.forEach(item => {
                weatherCount[item.weather] = (weatherCount[item.weather] || 0) + 1;
                if (item.rain0809) rain0809Count++;
                if (item.rain1819) rain1819Count++;
                minTempList.push(Number(item.tempMin));
                maxTempList.push(Number(item.tempMax));
            });

            const finalWeather = Object.keys(weatherCount).reduce((a, b) => weatherCount[a] > weatherCount[b] ? a : b);
            const avgMinTemp = Math.round(minTempList.reduce((a, b) => a + b, 0) / minTempList.length);
            const avgMaxTemp = Math.round(maxTempList.reduce((a, b) => a + b, 0) / maxTempList.length);
            
            let icon = '🌤️';
            if(finalWeather.includes('雨')) icon = '🌧️';
            if(finalWeather.includes('雷阵')) icon = '⛈️';
            if(finalWeather.includes('晴')) icon = '☀️';

            document.getElementById('finalWeather').innerHTML = `
                <div class="weather-icon">${icon}</div>
                ${finalWeather} | ${avgMinTemp}℃ ~ ${avgMaxTemp}℃<br>
                <span class="text-gray-600 text-sm font-normal">数据来源：4大权威平台对比，取多数结果</span>
            `;

            // ===================== 【精准小时提醒】 =====================
            const warningDom = document.getElementById('rainWarning');
            
            // 1. 上班 + 下班 都下雨
            if (rain0809Count >= 2 && rain1819Count >= 2) {
                warningDom.innerText = "⚠️ 完了！今天要成落汤鸡了！8-9点、18-19点全是雨！务必带好雨具 ⚠️";
                warningDom.classList.remove('hidden');
            }
            // 2. 仅 08:00-09:00 下雨
            else if (rain0809Count >= 2) {
                warningDom.innerText = "⚠️ 强提醒：今日 08:00-09:00 有雨！上班注意带伞 ⚠️";
                warningDom.classList.remove('hidden');
            }
            // 3. 仅 18:00-19:00 下雨
            else if (rain1819Count >= 2) {
                warningDom.innerText = "⚠️ 强提醒：今日 18:00-19:00 有雨！下班注意带伞 ⚠️";
                warningDom.classList.remove('hidden');
            }
        }

        // 6小时间隔时段
        function renderHourlyRain() {
            const container = document.getElementById('hourlyRainForecast');
            hourlyData.forEach((item) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-lg p-3 shadow-sm border border-gray-200";
                card.innerHTML = `
                    <p class="text-sm font-medium text-gray-700">${item.time}</p>
                    <p class="text-lg font-bold text-blue-600 mt-1">${item.rate}</p>
                `;
                container.appendChild(card);
            });
        }

        // 多平台
        function renderPlatforms() {
            const container = document.getElementById('weatherPlatforms');
            weatherData.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white border border-gray-200 rounded-xl p-4 text-center shadow-sm";
                card.innerHTML = `
                    <h3 class="font-bold text-gray-700 mb-2">${item.name}</h3>
                    <p class="text-lg font-semibold">${item.weather}</p>
                    <p class="text-gray-600">${item.tempMin}℃~${item.tempMax}℃</p>
                    <p class="text-blue-600 text-sm mt-1">降水: ${item.rainRate}</p>
                    <p class="text-xs text-gray-500 mt-1">8-9点:${item.rain0809?'✅':'❌'} 18-19点:${item.rain1819?'✅':'❌'}</p>
                `;
                container.appendChild(card);
            });
        }

        getFinalWeather();
        renderHourlyRain();
        renderPlatforms();
    </script>
</body>
</html>
