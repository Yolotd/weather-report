<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>珠村文华大街 - 实时天气看板（含台风/高温预警）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes warningFlash {
            0% { background-color: #dc2626; }
            50% { background-color: #ef4444; }
            100% { background-color: #dc2626; }
        }
        .flash-warning {
            animation: warningFlash 1s infinite;
        }
        .weather-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* 手机优化：卡片内边距微调 */
        @media (max-width: 640px) {
            .container-padding {
                padding-left: 1rem;
                padding-right: 1rem;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-50 via-blue-100 to-indigo-100 min-h-screen p-3 md:p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl p-5 md:p-8 container-padding">
        
        <!-- 标题 + 刷新按钮行 -->
        <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800 tracking-wide">📅 天气报告</h1>
                <p id="location-name" class="text-sm md:text-base text-gray-600 mt-1">📍 广东省广州市天河区珠村文华大街</p>
            </div>
            <button id="manual-refresh-btn" class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2 px-4 rounded-xl shadow-md transition flex items-center gap-2 text-sm md:text-base">
                🔄 刷新
            </button>
        </div>

        <!-- 搜索/定位栏（保留灵活切换城市） -->
        <div class="bg-gray-50 rounded-2xl p-3 mb-5 shadow-sm border">
            <div class="flex flex-col sm:flex-row gap-2">
                <input type="text" id="city-input" placeholder="输入城市名 (例: 广州、北京、上海)" class="flex-grow p-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm">
                <button id="search-btn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-xl transition shadow-md text-sm">🔍 搜索</button>
                <button id="auto-locate-btn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-xl transition shadow-md text-sm">📍 定位</button>
            </div>
        </div>

        <!-- 预警区域：台风预警 + 高温预警 -->
        <div id="alert-area" class="mb-5 space-y-2">
            <!-- 动态插入台风提醒和高温度提醒 -->
        </div>

        <!-- 实时日期时间 -->
        <div class="bg-gradient-to-r from-blue-100 to-sky-100 rounded-2xl p-3 text-center mb-5 shadow-sm">
            <p id="currentDateTime" class="text-lg md:text-xl font-semibold text-blue-800"></p>
        </div>

        <!-- 当前天气卡片 -->
        <div class="bg-gradient-to-r from-green-50 to-emerald-100 rounded-2xl p-5 mb-5 border-l-4 border-emerald-500 shadow-sm text-center">
            <h2 class="text-lg font-bold text-gray-700 mb-2">✅ 当前实况天气</h2>
            <div id="currentWeather" class="text-base md:text-2xl font-bold text-gray-800">
                <div class="loading-spinner"></div>
            </div>
        </div>

        <!-- 上下班关键时段 单独展示 -->
        <div class="bg-gradient-to-r from-amber-50 to-orange-100 rounded-2xl p-4 mb-5 shadow-sm">
            <h2 class="text-lg font-bold text-gray-700 mb-3 text-center">🚇 上下班降雨预报</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-center">
                <div class="bg-white p-3 rounded-xl shadow-sm border">
                    <p class="text-red-600 font-bold">⏰ 08:00 - 09:00 上班</p>
                    <p id="workRainRate" class="text-xl font-bold text-blue-600 mt-1">--%</p>
                    <p id="workRainStatus" class="text-sm mt-1">加载中...</p>
                </div>
                <div class="bg-white p-3 rounded-xl shadow-sm border">
                    <p class="text-red-600 font-bold">⏰ 18:00 - 19:00 下班</p>
                    <p id="offRainRate" class="text-xl font-bold text-blue-600 mt-1">--%</p>
                    <p id="offRainStatus" class="text-sm mt-1">加载中...</p>
                </div>
            </div>
        </div>

        <!-- 24小时逐6小时降雨概率 -->
        <div class="bg-gradient-to-r from-blue-50 to-sky-100 rounded-2xl p-4 mb-5 shadow-sm">
            <h2 class="text-lg font-bold text-gray-700 mb-3 text-center">🌧️ 24小时逐6小时降雨概率</h2>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 text-center" id="hourlyRainForecast">
                <div class="bg-white p-2 rounded-lg shadow text-sm">加载中...</div>
            </div>
        </div>

        <!-- 未来 3 天预报 -->
        <div class="mb-4">
            <h2 class="text-lg font-bold text-gray-700 mb-3 text-center">📅 未来 3 天预报</h2>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3" id="dailyForecast"></div>
        </div>
        
        <div class="text-center text-xs text-gray-400 mt-4 pt-2 border-t">
            ⚡ 数据来自 Open-Meteo | 自动刷新间隔 10 分钟
        </div>
    </div>

    <script>
        // ---------- 配置 ----------
        const DEFAULT_LAT = 23.1200;
        const DEFAULT_LON = 113.4100;
        const DEFAULT_NAME = "广东省广州市天河区珠村文华大街";
        let currentLat = DEFAULT_LAT;
        let currentLon = DEFAULT_LON;
        let currentName = DEFAULT_NAME;
        let autoRefreshTimer = null;

        // 辅助：格式化时间（每秒更新）
        function updateDateTime() {
            const now = new Date();
            const opt = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('currentDateTime').innerText = now.toLocaleDateString('zh-CN', opt);
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // 天气代码映射
        function getWeatherDesc(code) {
            const map = { 0:"晴",1:"晴",2:"晴",3:"晴",45:"雾",48:"雾",51:"毛毛雨",53:"毛毛雨",55:"毛毛雨",56:"冻雨",57:"冻雨",61:"小雨",63:"中雨",65:"大雨",66:"冻雨",67:"冻雨",71:"小雪",73:"中雪",75:"大雪",77:"雪粒",80:"小雨",81:"中雨",82:"大雨",85:"小雪",86:"大雪",95:"雷暴",96:"雷暴",99:"雷暴" };
            return map[code] || "未知";
        }
        function getWeatherIcon(code) {
            const map = { 0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌧️",56:"🌧️❄️",57:"🌧️❄️",61:"🌧️",63:"🌧️",65:"🌧️💧",66:"🌧️❄️",67:"🌧️❄️",71:"❄️",73:"❄️",75:"❄️❄️",77:"❄️",80:"🌦️",81:"🌧️",82:"🌧️💧",85:"❄️",86:"❄️❄️",95:"⛈️",96:"⛈️",99:"⛈️" };
            return map[code] || "🌡️";
        }

        // 显示台风预警（基于 warnings 数组）和高温预警
        function updateAlerts(data, dailyMaxTempToday) {
            const alertDiv = document.getElementById('alert-area');
            alertDiv.innerHTML = '';
            let hasAlert = false;

            // 1. 台风预警：检查 warnings 数组中是否有台风相关事件
            if (data.warnings && data.warnings.length) {
                const typhoonWarnings = data.warnings.filter(w => {
                    const event = w.event ? w.event.toLowerCase() : '';
                    const desc = w.event_description ? w.event_description.toLowerCase() : '';
                    return event.includes('typhoon') || desc.includes('台风') || event.includes('storm') || desc.includes('风暴');
                });
                if (typhoonWarnings.length) {
                    hasAlert = true;
                    const typhoonHtml = typhoonWarnings.map(w => `
                        <div class="bg-red-600 text-white p-3 rounded-xl shadow-md flex items-start gap-2 flash-warning">
                            <span class="text-2xl">🌀</span>
                            <div class="flex-1">
                                <p class="font-bold">⚠️ 台风预警 ⚠️</p>
                                <p class="text-sm">${w.event_description || w.event || '台风影响中，请注意防范！'}</p>
                                ${w.sender_name ? `<p class="text-xs opacity-80 mt-1">来源：${w.sender_name}</p>` : ''}
                            </div>
                        </div>
                    `).join('');
                    alertDiv.innerHTML += typhoonHtml;
                }
            }

            // 2. 高温预警（当天最高温 >=35）
            if (dailyMaxTempToday >= 35) {
                hasAlert = true;
                alertDiv.innerHTML += `
                    <div class="bg-orange-500 text-white p-3 rounded-xl shadow-md flex items-center gap-2">
                        <span class="text-2xl">🔥</span>
                        <div>
                            <p class="font-bold">高温预警</p>
                            <p class="text-sm">今日最高气温将达到 ${dailyMaxTempToday}℃，请注意防暑降温！</p>
                        </div>
                    </div>
                `;
            }

            if (!hasAlert) {
                alertDiv.innerHTML = `<div class="bg-gray-100 text-gray-500 p-2 rounded-xl text-center text-sm">暂无台风或高温预警</div>`;
            }
        }

        // 核心天气获取函数
        async function fetchWeather(lat, lon, locationName) {
            // 显示加载状态
            document.getElementById('currentWeather').innerHTML = `<div class="loading-spinner"></div>`;
            document.getElementById('hourlyRainForecast').innerHTML = `<div class="col-span-4 text-center py-4 text-gray-500">加载天气数据...</div>`;
            document.getElementById('dailyForecast').innerHTML = `<div class="col-span-3 text-center py-4 text-gray-500">加载中...</div>`;
            document.getElementById('workRainRate').innerText = '--%';
            document.getElementById('offRainRate').innerText = '--%';
            document.getElementById('alert-area').innerHTML = `<div class="text-gray-400 text-center text-sm">检查预警中...</div>`;

            try {
                const timezone = 'Asia/Shanghai';
                // 请求：当前 + 小时级(降水概率) + 每日 + 预警
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m&hourly=precipitation_probability,temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=${timezone}&forecast_days=3&warnings=true`;
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();

                document.getElementById('location-name').innerHTML = `📍 ${locationName}`;
                
                // 当前天气
                const currentTemp = Math.round(data.current.temperature_2m);
                const currentCode = data.current.weather_code;
                const currentWind = data.current.wind_speed_10m;
                document.getElementById('currentWeather').innerHTML = `
                    <div class="weather-icon">${getWeatherIcon(currentCode)}</div>
                    <div>${getWeatherDesc(currentCode)} | ${currentTemp}℃</div>
                    <div class="text-gray-600 text-sm">💨 风速 ${currentWind} km/h</div>
                `;

                // 每日数据（用于高温预警）
                const dailyMaxTempToday = Math.round(data.daily.temperature_2m_max[0]);
                // 台风预警 + 高温
                updateAlerts(data, dailyMaxTempToday);

                // 上下班降雨概率（小时级）
                const hourlyTimes = data.hourly.time;
                const hourlyProbs = data.hourly.precipitation_probability;
                const now = new Date();
                const todayStr = now.toISOString().slice(0,10);
                const tomorrowDate = new Date(now);
                tomorrowDate.setDate(now.getDate() + 1);
                const tomorrowStr = tomorrowDate.toISOString().slice(0,10);

                function getProbForHour(dateStr, hour) {
                    const targetTime = `${dateStr}T${hour.toString().padStart(2,'0')}:00`;
                    const idx = hourlyTimes.indexOf(targetTime);
                    if (idx !== -1 && idx < hourlyProbs.length) return hourlyProbs[idx];
                    return null;
                }
                let workProbs = [];
                let p8 = getProbForHour(todayStr, 8), p9 = getProbForHour(todayStr, 9);
                if (p8 !== null) workProbs.push(p8);
                if (p9 !== null) workProbs.push(p9);
                if (workProbs.length === 0) {
                    let p8t = getProbForHour(tomorrowStr, 8), p9t = getProbForHour(tomorrowStr, 9);
                    if (p8t !== null) workProbs.push(p8t);
                    if (p9t !== null) workProbs.push(p9t);
                }
                const workAvg = workProbs.length ? Math.round(workProbs.reduce((a,b)=>a+b,0)/workProbs.length) : 0;

                let offProbs = [];
                let p18 = getProbForHour(todayStr, 18), p19 = getProbForHour(todayStr, 19);
                if (p18 !== null) offProbs.push(p18);
                if (p19 !== null) offProbs.push(p19);
                if (offProbs.length === 0) {
                    let p18t = getProbForHour(tomorrowStr, 18), p19t = getProbForHour(tomorrowStr, 19);
                    if (p18t !== null) offProbs.push(p18t);
                    if (p19t !== null) offProbs.push(p19t);
                }
                const offAvg = offProbs.length ? Math.round(offProbs.reduce((a,b)=>a+b,0)/offProbs.length) : 0;

                document.getElementById('workRainRate').innerText = `${workAvg}%`;
                document.getElementById('offRainRate').innerText = `${offAvg}%`;
                document.getElementById('workRainStatus').innerHTML = workAvg >= 60 ? "⚠️ 有雨风险，带伞" : "✅ 无雨，轻松出行";
                document.getElementById('offRainStatus').innerHTML = offAvg >= 60 ? "⚠️ 有雨风险，带伞" : "✅ 无雨，愉快下班";

                // 强提醒（上下班降雨闪烁）单独顶部加一个？保留原代码风格，但原代码中是用独立区域闪红，我们可以复用，但注意不要和预警冲突，为了简洁，利用原有的 rainWarning 区域？原代码未使用该区域，我们直接用 alert-area 已经包含了台风高温，上下班降雨风险也可以再加一个闪烁条？可选，但为了不过度，不另加。
                // 但是为了保留原设计风格，我们额外添加一个降雨风险闪烁条（可选），但用户没说，我们不加，专注于台风高温。
                
                // 逐6小时降雨概率
                const startIdx = hourlyTimes.findIndex(t => t >= now.toISOString().slice(0,16)+':00');
                const validStart = startIdx !== -1 ? startIdx : 0;
                const periods = [
                    { name: "00:00-06:00", hours: [0,1,2,3,4,5] },
                    { name: "06:00-12:00", hours: [6,7,8,9,10,11] },
                    { name: "12:00-18:00", hours: [12,13,14,15,16,17] },
                    { name: "18:00-24:00", hours: [18,19,20,21,22,23] }
                ];
                const futureProbs = [];
                for (let i = validStart; i < Math.min(validStart+24, hourlyProbs.length); i++) {
                    const hour = new Date(hourlyTimes[i]).getHours();
                    futureProbs.push({ hour, prob: hourlyProbs[i] });
                }
                function avgProbForPeriod(periodHours) {
                    let sum = 0, count = 0;
                    for (let item of futureProbs) {
                        if (periodHours.includes(item.hour)) {
                            sum += item.prob;
                            count++;
                        }
                    }
                    return count ? Math.round(sum/count) : 0;
                }
                const periodData = periods.map(p => ({ name: p.name, prob: avgProbForPeriod(p.hours) }));
                const hourContainer = document.getElementById('hourlyRainForecast');
                hourContainer.innerHTML = periodData.map(p => `
                    <div class="bg-white rounded-lg p-2 shadow-sm border text-center">
                        <p class="text-xs font-medium">${p.name}</p>
                        <p class="text-lg font-bold text-blue-600">${p.prob}%</p>
                    </div>
                `).join('');

                // 未来3天预报
                const dailyTimes = data.daily.time;
                const dailyWeatherCodes = data.daily.weather_code;
                const dailyMax = data.daily.temperature_2m_max;
                const dailyMin = data.daily.temperature_2m_min;
                const dailyContainer = document.getElementById('dailyForecast');
                let dailyHtml = '';
                for (let i = 0; i < Math.min(3, dailyTimes.length); i++) {
                    const date = new Date(dailyTimes[i]);
                    const weekday = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][date.getDay()];
                    const month = date.getMonth()+1;
                    const day = date.getDate();
                    const icon = getWeatherIcon(dailyWeatherCodes[i]);
                    const desc = getWeatherDesc(dailyWeatherCodes[i]);
                    const maxT = Math.round(dailyMax[i]);
                    const minT = Math.round(dailyMin[i]);
                    dailyHtml += `
                        <div class="bg-white rounded-xl p-3 text-center shadow-sm border">
                            <p class="font-bold text-sm">${month}/${day} (${weekday})</p>
                            <div class="text-3xl my-1">${icon}</div>
                            <p class="text-gray-600 text-xs">${desc}</p>
                            <p class="font-bold">${maxT}° / ${minT}°</p>
                        </div>
                    `;
                }
                dailyContainer.innerHTML = dailyHtml;

            } catch (err) {
                console.error(err);
                document.getElementById('currentWeather').innerHTML = `<div class="text-red-500">天气数据加载失败：${err.message}</div>`;
                document.getElementById('hourlyRainForecast').innerHTML = `<div class="col-span-4 text-red-500 text-center">获取失败，请稍后重试</div>`;
                document.getElementById('dailyForecast').innerHTML = `<div class="col-span-3 text-red-500 text-center">获取失败</div>`;
                document.getElementById('alert-area').innerHTML = `<div class="text-red-400 text-center">预警信息获取失败</div>`;
            }
        }

        // 刷新包装（重置自动刷新计时器）
        function refreshWeather() {
            fetchWeather(currentLat, currentLon, currentName);
            // 重置自动刷新定时器
            if (autoRefreshTimer) clearInterval(autoRefreshTimer);
            autoRefreshTimer = setInterval(() => {
                fetchWeather(currentLat, currentLon, currentName);
            }, 10 * 60 * 1000); // 10分钟
        }

        // 地理编码
        async function geocodeCity(cityName) {
            const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1&language=zh&format=json`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('地理编码失败');
            const data = await resp.json();
            if (data.results && data.results.length) {
                const r = data.results[0];
                return { lat: r.latitude, lon: r.longitude, name: r.name };
            } else {
                throw new Error(`未找到城市“${cityName}”`);
            }
        }

        async function onSearch() {
            const city = document.getElementById('city-input').value.trim();
            if (!city) return;
            try {
                const loc = await geocodeCity(city);
                currentLat = loc.lat;
                currentLon = loc.lon;
                currentName = loc.name;
                refreshWeather(); // 刷新并重置定时器
            } catch (err) {
                alert(err.message);
            }
        }

        async function onAutoLocate() {
            if (!navigator.geolocation) {
                alert("浏览器不支持定位");
                return;
            }
            navigator.geolocation.getCurrentPosition(async (pos) => {
                currentLat = pos.coords.latitude;
                currentLon = pos.coords.longitude;
                currentName = "您的位置";
                refreshWeather();
            }, async (err) => {
                console.warn(err);
                alert("定位失败，使用珠村默认地址");
                currentLat = DEFAULT_LAT;
                currentLon = DEFAULT_LON;
                currentName = DEFAULT_NAME;
                refreshWeather();
            });
        }

        // 手动刷新按钮
        document.getElementById('manual-refresh-btn').addEventListener('click', () => {
            refreshWeather();
        });
        document.getElementById('search-btn').addEventListener('click', onSearch);
        document.getElementById('auto-locate-btn').addEventListener('click', onAutoLocate);

        // 初始化加载并启动自动刷新
        refreshWeather();
    </script>
</body>
</html>
